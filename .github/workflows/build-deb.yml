name: 构建DEB安装包

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-deb:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 安装系统依赖
      run: |
        sudo apt update
        sudo apt install -y python3 python3-pip python3-venv
        sudo apt install -y build-essential dpkg-dev debhelper
        sudo apt install -y libqt5gui5 libqt5widgets5 libqt5core5a
    
    - name: 安装Python依赖
      run: |
        python3 -m venv venv
        source venv/bin/activate
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: 使用PyInstaller打包
      run: |
        source venv/bin/activate
        pyinstaller --onefile --windowed \
          --name "材料管理系统" \
          --icon=icon.png \
          --add-data "resources:resources" \
          main.py
    
    - name: 创建DEB包目录结构
      run: |
        rm -rf package
        mkdir -p package/DEBIAN
        mkdir -p package/opt/material-manager
        mkdir -p package/usr/share/applications
        mkdir -p package/usr/share/icons/hicolor/256x256/apps
    
    - name: 复制文件
      run: |
        cp "dist/材料管理系统" package/opt/material-manager/
        cp -r resources package/opt/material-manager/ 2>/dev/null || true
        cp icon.png package/usr/share/icons/hicolor/256x256/apps/com.document.manager.png
        chmod +x package/opt/material-manager/材料管理系统
    
    - name: 创建control文件
      run: |
        DU_SIZE=$(du -sk package | cut -f1)
        INSTALLED_SIZE=$(($DU_SIZE / 1024))
        
        cat > package/DEBIAN/control << EOF
        Package: material-manager
        Version: 1.0.0
        Section: office
        Priority: optional
        Architecture: amd64
        Installed-Size: $INSTALLED_SIZE
        Depends: python3, libqt5gui5, libqt5widgets5, libqt5core5a
        Maintainer: J.F
        Description: 材料管理系统
         党政机关材料管理软件，支持文档导入、全文检索、智能分析等功能。
        EOF
    
    - name: 创建postinst脚本
      run: |
        cat > package/DEBIAN/postinst << 'EOF'
        #!/bin/bash
        set -e
        cat > /usr/share/applications/com.document.manager.desktop << 'DESKTOP'
        [Desktop Entry]
        Name=材料管理系统
        Name[zh_CN]=材料管理系统
        Comment=党政机关材料管理软件
        Comment[zh_CN]=党政机关材料管理软件
        Exec=/opt/material-manager/材料管理系统
        Icon=com.document.manager
        Terminal=false
        Type=Application
        Categories=Office;Qt;
        StartupNotify=true
        DESKTOP
        chmod +x /opt/material-manager/材料管理系统
        update-desktop-database /usr/share/applications 2>/dev/null || true
        gtk-update-icon-cache /usr/share/icons/hicolor 2>/dev/null || true
        exit 0
        EOF
        chmod 755 package/DEBIAN/postinst
    
    - name: 创建prerm脚本
      run: |
        cat > package/DEBIAN/prerm << 'EOF'
        #!/bin/bash
        set -e
        rm -f /usr/share/applications/com.document.manager.desktop
        rm -f ~/Desktop/材料管理系统.desktop 2>/dev/null || true
        exit 0
        EOF
        chmod 755 package/DEBIAN/prerm
    
    - name: 构建DEB包
      run: |
        dpkg-deb --build package "材料管理系统_1.0.0_amd64.deb"
        ls -lh "材料管理系统_1.0.0_amd64.deb"
    
    - name: 上传DEB包
      uses: actions/upload-artifact@v4
      with:
        name: deb-package
        path: 材料管理系统_1.0.0_amd64.deb
        retention-days: 30
    
    - name: 创建Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.0
        name: 材料管理系统 v1.0.0
        body: |
          ## 材料管理系统 DEB安装包
          
          ### 下载说明
          1. 下载 `材料管理系统_1.0.0_amd64.deb` 文件
          2. 在UOS上双击安装，或运行：`sudo dpkg -i 材料管理系统_1.0.0_amd64.deb`
          
          ### 安装后
          - 在应用菜单中找到"材料管理系统"
          - 或在桌面双击快捷方式
          
          ### 卸载
          ```bash
          sudo dpkg -r material-manager
          ```
        files: |
          材料管理系统_1.0.0_amd64.deb
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
